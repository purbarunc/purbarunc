name: Update readme

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm install

      - name: Generate readme
        run: node build-svg.js

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: Purbarun Chakrabarti
          author_email: purbarun@gmail.com
          message: "Auto updating my readme"
          add: "*.svg"

      - name: Create issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "README workflow failed" \
            --body "The daily README update workflow failed. [View the run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
